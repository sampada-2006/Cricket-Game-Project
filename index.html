<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game Based on if else</title>
    <link rel="stylesheet" href="cricket.css">
</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <button onclick="
    let computerChoice=randomeChoice();
    cricketGame(computerChoice,'Bat');
    ">Bat</button>

    <button onclick="
      computerChoice=randomeChoice();
      cricketGame(computerChoice,'Ball');
    ">Ball</button>

    <button onclick="
     computerChoice=randomeChoice();
     cricketGame(computerChoice,'Stump');
    ">Stump</button>
    <div id="display"></div>
    <script>
        let msg="Let's Play The Game";
        document.querySelector('#display').innerText=msg;
        function randomeChoice(){
            let randomNo=Math.random()*3;
             if(randomNo>=0 && randomNo<=1){
                  return 'Bat';
             }else if(randomNo>1 && randomNo<=2){
                  return 'Ball';
             }else{
                  return 'Stump';
             }
        }
        function cricketGame(c,u){
             let result;
             if(c===u){
                  result=`It's a Tie`;
             }else if(u==='Bat'){
                if(c==='Ball') result='User won';
                else result='Computer won';
             }else if(u==='Ball'){
                if(c==='Bat') result='Computer won';
                else result='User won';
             }else{
                if(c==='Bat') result='User won';
                else result='Computer won';
             }
             msg=`User choice is ${u}. Computer choice is ${c} . ${result}`;
             document.querySelector('#display').innerText=msg;
        }   
    </script>  
</body>
</html>
