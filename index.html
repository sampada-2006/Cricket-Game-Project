<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game Based on if else</title>
    <link rel="stylesheet" href="cricket.css">
</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <button class="choice-button" onclick="
    let computerChoice=randomeChoice();
    cricketGame(computerChoice,'Bat');
    "><img src="bat.jpg" alt="bat image" class="choice-image"></button>

    <button class="choice-button" onclick="
      computerChoice=randomeChoice();
      cricketGame(computerChoice,'Ball');
    "><img src="ball.png" alt="ball image" class="choice-image"></button>

    <button class="choice-button" onclick="
     computerChoice=randomeChoice();
     cricketGame(computerChoice,'Stump');
    "><img src="stump.jpg" alt="stump image" class="choice-image"></button>

    <h3 id="user-move"></h3>
    <h3 id="computer-move"></h3>
    <h3 id="result"></h3>
    <h3 id="score"></h3>

    <button onclick="localStorage.clear();
    resetScore();
    document.querySelector('#user-move').innerText='';
    document.querySelector('#computer-move').innerText='';
    document.querySelector('#result').innerText='';
    document.querySelector('#score').innerText=`Win:${score.win} Lost:${score.lost} Tie:${score.tie}`;"
    >Reset</button>
    <script>
        let score;
        let scoreStr=localStorage.getItem('score');
        resetScore(scoreStr);
        document.querySelector('#score').innerText=`Win:${score.win} Lost:${score.lost} Tie:${score.tie}`;
        function resetScore(scoreStr){
           score=scoreStr ? JSON.parse(scoreStr) :{
           win:0,
           lost:0,
           tie:0,
        }; 
        score.displayScore=function (c,u,result){
              localStorage.setItem('score',JSON.stringify(score));
              document.querySelector('#user-move').innerText=`User choice is ${u}`;
              document.querySelector('#computer-move').innerText=`Computer choice is ${c}`;
              document.querySelector('#result').innerText=`${result}`;
              document.querySelector('#score').innerText=`Win:${score.win} Lost:${score.lost} Tie:${score.tie}`;
           };
        }
        function randomeChoice(){
            let randomNo=Math.random()*3;
             if(randomNo>=0 && randomNo<=1){
                  return 'Bat';
             }else if(randomNo>1 && randomNo<=2){
                  return 'Ball';
             }else{
                  return 'Stump';
             }
        }
        function cricketGame(c,u){
             let result;
             if(c===u){
                  score.tie++;
                  result=`It's a Tie`;
             }else if(u==='Bat'){
                if(c==='Ball') {
                    score.win++;
                    result='User won';
                }
                else {
                    score.lost++;
                    result='Computer won';
                }
             }else if(u==='Ball'){
                if(c==='Bat') {
                    score.lost++;
                    result='Computer won';
                }
                else {
                    score.win++;
                    result='User won';
                }
             }else{
                if(c==='Bat') {
                    score.win++;
                    result='User won';
                }
                else {
                    score.lost++;
                    result='Computer won';
                }
             }
             score.displayScore(c,u,result);
        }   
    </script>  
</body>
</html>
