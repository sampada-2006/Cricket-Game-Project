<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game Based on if else</title>
    <link rel="stylesheet" href="cricket.css">
</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <button onclick="
    let computerChoice=randomeChoice();
    cricketGame(computerChoice,'Bat');
    ">Bat</button>

    <button onclick="
      computerChoice=randomeChoice();
      cricketGame(computerChoice,'Ball');
    ">Ball</button>

    <button onclick="
     computerChoice=randomeChoice();
     cricketGame(computerChoice,'Stump');
    ">Stump</button>
    <div id="display"></div>
    <script>
        let score={
           win:0,
           lost:0,
           tie:0,
           displayScore(c,u,result){
              let msg=`User choice is ${u}. Computer choice is ${c} . ${result}\nWin:${score.win} Lost:${score.lost} Tie:${score.tie}`;
              document.querySelector('#display').innerText=msg;
           },
        };
        function randomeChoice(){
            let randomNo=Math.random()*3;
             if(randomNo>=0 && randomNo<=1){
                  return 'Bat';
             }else if(randomNo>1 && randomNo<=2){
                  return 'Ball';
             }else{
                  return 'Stump';
             }
        }
        function cricketGame(c,u){
             let result;
             if(c===u){
                  score.tie++;
                  result=`It's a Tie`;
             }else if(u==='Bat'){
                if(c==='Ball') {
                    score.win++;
                    result='User won';
                }
                else {
                    score.lost++;
                    result='Computer won';
                }
             }else if(u==='Ball'){
                if(c==='Bat') {
                    score.lost++;
                    result='Computer won';
                }
                else {
                    score.win++;
                    result='User won';
                }
             }else{
                if(c==='Bat') {
                    score.win++;
                    result='User won';
                }
                else {
                    score.lost++;
                    result='Computer won';
                }
             }
             score.displayScore(c,u,result);
        }   
    </script>  
</body>
</html>
